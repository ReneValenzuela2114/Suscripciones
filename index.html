<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>Mis Suscripciones</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B3%3C/text%3E%3C/svg%3E" />
<style>
:root{
  --bg:#0b1020; --bg2:#0e1530; --card:#161e3d; --card2:#1c264a;
  --line:rgba(255,255,255,.08); --txt:#eef1ff; --muted:#9aa3c7; --muted2:#6b74a0;
  --brand:#6366f1; --brand2:#8b5cf6; --accent:#22d3ee;
  --green:#34d399; --amber:#fbbf24; --red:#fb7185;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --r:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  color:var(--txt); background:
    radial-gradient(1200px 700px at 80% -10%, #1b2452 0%, transparent 55%),
    radial-gradient(900px 600px at -10% 10%, #241a4d 0%, transparent 50%),
    var(--bg);
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
input,select,textarea{font-family:inherit;font-size:16px}
.hidden{display:none!important}

/* ----------------------------- Login ----------------------------- */
#login{
  position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;gap:18px;
  background:radial-gradient(800px 500px at 50% 0%, #1a2350, var(--bg));
}
#login .logo{font-size:64px;filter:drop-shadow(0 8px 20px rgba(99,102,241,.5))}
#login h1{margin:0;font-size:24px;font-weight:800;letter-spacing:-.5px}
#login p{margin:0;color:var(--muted);font-size:14px}
.pwbox{display:flex;gap:10px;width:100%;max-width:340px;margin-top:8px}
.pwbox input{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:15px 16px;color:var(--txt);outline:none;text-align:center;letter-spacing:3px
}
.pwbox input:focus{border-color:var(--brand)}
.btn{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:14px;padding:15px 18px;font-weight:700;font-size:15px;
  box-shadow:0 8px 20px rgba(99,102,241,.4);transition:transform .12s, filter .12s
}
.btn:active{transform:scale(.97);filter:brightness(1.05)}
.btn.ghost{background:var(--card);box-shadow:none;border:1px solid var(--line)}
.btn.danger{background:linear-gradient(135deg,#f43f5e,#fb7185);box-shadow:0 8px 20px rgba(244,63,94,.35)}
.err{color:var(--red);font-size:13px;min-height:16px}

/* ----------------------------- App shell ----------------------------- */
#app{max-width:560px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));min-height:100%}
.topbar{
  position:sticky;top:0;z-index:20;padding:calc(14px + env(safe-area-inset-top)) 2px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg, var(--bg) 60%, transparent);
}
.topbar h2{margin:0;font-size:22px;font-weight:800;letter-spacing:-.5px}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.iconbtn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-size:18px}

/* hero próximo pago */
.hero{
  position:relative;border-radius:24px;padding:20px;margin-bottom:18px;overflow:hidden;
  background:linear-gradient(135deg,#5b54f0,#8b5cf6 55%,#c026d3);
  box-shadow:0 16px 40px rgba(99,102,241,.45)
}
.hero:before{content:"";position:absolute;right:-40px;top:-50px;width:180px;height:180px;
  background:rgba(255,255,255,.16);border-radius:50%}
.hero:after{content:"";position:absolute;right:30px;bottom:-60px;width:140px;height:140px;
  background:rgba(255,255,255,.10);border-radius:50%}
.hero .lbl{font-size:12px;font-weight:600;opacity:.9;letter-spacing:.4px;text-transform:uppercase}
.hero .name{font-size:24px;font-weight:800;margin-top:6px}
.hero .row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px;position:relative;z-index:1}
.hero .amt{font-size:30px;font-weight:800}
.hero .when{font-size:13px;background:rgba(255,255,255,.22);padding:7px 12px;border-radius:999px;font-weight:700}
.hero.empty{background:linear-gradient(135deg,#1e2a52,#2a2150)}

/* stat chips */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px}
.stat .k{font-size:11px;color:var(--muted);font-weight:600}
.stat .v{font-size:17px;font-weight:800;margin-top:4px}
.stat .v small{font-size:11px;color:var(--muted2);font-weight:700}

/* section title + order toggle */
.sectionhdr{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px}
.sectionhdr .t{font-size:14px;font-weight:700;color:var(--muted)}
.toggleorder{font-size:12px;color:var(--accent);font-weight:700;display:flex;align-items:center;gap:5px}

/* subscription card */
.list{display:flex;flex-direction:column;gap:11px}
.subcard{
  display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:13px 14px;position:relative;transition:transform .12s, box-shadow .2s;
  touch-action:pan-y
}
.subcard.dragging{opacity:.6;box-shadow:var(--shadow);transform:scale(1.02);z-index:5}
.subcard.drop-target{box-shadow:0 0 0 2px var(--brand) inset}
.avatar{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:24px;
  font-weight:800;flex-shrink:0;overflow:hidden;color:#fff}
.avatar img{width:100%;height:100%;object-fit:cover}
.subinfo{flex:1;min-width:0}
.subinfo .nm{font-weight:700;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subinfo .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.green{background:rgba(52,211,153,.16);color:var(--green)}
.pill.amber{background:rgba(251,191,36,.16);color:var(--amber)}
.pill.red{background:rgba(251,113,133,.18);color:var(--red)}
.pill.blue{background:rgba(99,102,241,.18);color:#a5b4fc}
.subright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.subright .amt{font-weight:800;font-size:15px}
.subright .cur{font-size:10px;color:var(--muted2);font-weight:700}
.paybtn{background:linear-gradient(135deg,var(--green),#10b981);color:#04231a;font-weight:800;
  font-size:12px;padding:7px 12px;border-radius:10px}
.paybtn:active{transform:scale(.95)}

/* expand details */
.details{margin-top:11px;padding-top:12px;border-top:1px dashed var(--line);display:none;flex-direction:column;gap:9px}
.subcard.open .details{display:flex}
.detrow{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.detrow .lab{color:var(--muted)}
.paylist{display:flex;flex-direction:column;gap:6px}
.payitem{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);
  border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:13px}
.payitem.done{opacity:.55}
.payitem .pd{display:flex;align-items:center;gap:8px}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--muted2);display:grid;place-items:center;font-size:12px}
.chk.on{background:var(--green);border-color:var(--green);color:#04231a}
.minibtns{display:flex;gap:8px;margin-top:4px}
.minibtns .btn{flex:1;padding:11px;font-size:13px}

/* form */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:7px}
.input,select.input,textarea.input{
  width:100%;max-width:100%;min-width:0;background:var(--bg2);border:1px solid var(--line);border-radius:13px;
  padding:13px 14px;color:var(--txt);outline:none;transition:border-color .15s
}
.input:focus{border-color:var(--brand)}
textarea.input{resize:vertical;min-height:64px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.two>*,.three>*{min-width:0}
.field>*{min-width:0}
.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px}
.seg button{flex:1;padding:11px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.emojigrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}
.emojigrid button{aspect-ratio:1;border-radius:12px;background:var(--bg2);border:1px solid var(--line);font-size:22px;display:grid;place-items:center}
.emojigrid button.on{outline:2px solid var(--brand);background:var(--card2)}
.colorrow{display:flex;gap:9px;flex-wrap:wrap}
.swatch{width:36px;height:36px;border-radius:50%;border:2px solid transparent;flex-shrink:0;position:relative;transition:transform .12s}
.swatch.on{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--brand);transform:scale(1.1)}

/* subir logo */
.uploadbox{border:1.5px dashed var(--line);border-radius:16px;padding:20px 16px;text-align:center;background:var(--bg2);transition:border-color .15s}
.uploadbox:active{border-color:var(--brand)}
.uploadbtn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--brand),var(--brand2));padding:12px 18px;border-radius:12px;font-weight:700;font-size:14px;color:#fff;box-shadow:0 6px 16px rgba(99,102,241,.4)}
.uploadbtn:active{transform:scale(.97)}
.uploaded{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--green);border-radius:16px;padding:12px}
.uploaded .thumb{width:48px;height:48px;border-radius:12px;overflow:hidden;display:grid;place-items:center;flex-shrink:0;border:1px solid var(--line)}
.uploaded .thumb img{width:100%;height:100%;object-fit:contain}
.uploaded .ok{font-weight:800;font-size:13.5px;color:var(--green);display:flex;align-items:center;gap:5px}
.uploaded .subt{font-size:12px;color:var(--muted);margin-top:2px}
.linklike{color:var(--accent);font-weight:700;font-size:12.5px;background:var(--card2);padding:8px 12px;border-radius:10px}
.uploading{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--muted);font-size:13px}
.spinner{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.preview{display:flex;align-items:center;gap:13px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:14px}
.manualpay{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.manualpay .input{flex:1}
.addrow{color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}

/* summary */
.bigstat{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
  border-radius:20px;padding:18px;margin-bottom:13px}
.bigstat .k{font-size:13px;color:var(--muted);font-weight:600}
.bigstat .v{font-size:32px;font-weight:800;margin-top:6px}
.bigstat .v small{font-size:14px;color:var(--muted)}
.bars{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.barrow .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.barrow .track{height:9px;background:var(--bg2);border-radius:999px;overflow:hidden}
.barrow .fill{height:100%;border-radius:999px}

/* bottom nav */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:8px 14px calc(8px + env(safe-area-inset-bottom));
  display:flex;justify-content:space-around;
  background:rgba(13,18,38,.82);backdrop-filter:blur(18px);
  border-top:1px solid var(--line)
}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted2);font-size:10.5px;font-weight:600;padding:6px 14px;border-radius:14px}
.nav button .ic{font-size:21px;line-height:1}
.nav button.on{color:var(--txt)}
.nav button.on .ic{filter:drop-shadow(0 4px 10px rgba(99,102,241,.6))}
.nav .fab{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;width:54px;height:54px;border-radius:18px;margin-top:-22px;box-shadow:0 10px 24px rgba(99,102,241,.5);font-size:26px;display:grid;place-items:center}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .e{font-size:54px}
.empty-state p{margin:12px 0 0;font-size:14px}

/* toast */
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--line);padding:12px 18px;border-radius:14px;
  font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;
  transition:opacity .25s, transform .25s;z-index:60;max-width:90%}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.page{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Ajustes para teléfonos pequeños */
@media (max-width:400px){
  #app{padding-left:13px;padding-right:13px}
  .stats{gap:8px}
  .stat{padding:11px 10px}
  .stat .k{font-size:10px}
  .stat .v{font-size:15px}
  .hero{padding:18px}
  .hero .amt{font-size:26px}
  .hero .name{font-size:21px}
  .emojigrid{grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}
  .emojigrid button{font-size:20px}
  .seg button{font-size:12px;padding:10px 6px}
  .avatar{width:44px;height:44px;font-size:22px}
}
@media (max-width:340px){
  .emojigrid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo">💳</div>
  <h1>Mis Suscripciones</h1>
  <p>Ingresa tu contraseña para continuar</p>
  <div class="pwbox">
    <input id="pw" type="password" inputmode="numeric" placeholder="• • • •" autocomplete="current-password" />
    <button class="btn" onclick="doLogin()">Entrar</button>
  </div>
  <div class="err" id="loginErr"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div>
      <h2 id="pageTitle">Próximos pagos</h2>
      <div class="sub" id="pageSub"></div>
    </div>
    <button class="iconbtn" onclick="go('settings')">⚙️</button>
  </div>
  <div id="content"></div>
</div>

<!-- NAV -->
<div class="nav hidden" id="nav">
  <button data-tab="queue" class="on" onclick="go('queue')"><span class="ic">📋</span>Pagos</button>
  <button data-tab="summary" onclick="go('summary')"><span class="ic">📊</span>Resumen</button>
  <button class="fab" onclick="go('add')">＋</button>
  <button data-tab="all" onclick="go('all')"><span class="ic">🗂️</span>Todas</button>
  <button data-tab="settings" onclick="go('settings')"><span class="ic">⚙️</span>Ajustes</button>
</div>

<div id="toast"></div>

<script>
/* ============================== estado / api ============================== */
const API = "";
let TOKEN = localStorage.getItem("sub_token") || "";
let STATE = null;
let TAB = "queue";
let EDIT_ID = null;

const EMOJIS = ["💳","📺","🎬","🎵","🎮","☁️","📱","🛡️","🚗","🏠","💡","💧","📶","🔥","🍿","📚","🧠","🤖","💪","🎧","🛒","✈️","🐱","📰","🩺","💼","🌐","⚡","🎨","🔑","📡","🏦"];
const COLORS = ["#6366f1","#8b5cf6","#ec4899","#f43f5e","#f59e0b","#10b981","#06b6d4","#3b82f6","#84cc16","#a855f7","#ef4444","#14b8a6","#ffffff","transparent"];

function $(s,el=document){return el.querySelector(s)}
function h(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstElementChild}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200)}

async function api(path, opt={}){
  const o={headers:{}, ...opt};
  if(TOKEN) o.headers["Authorization"]="Bearer "+TOKEN;
  if(o.body && !(o.body instanceof ArrayBuffer) && typeof o.body!=="string" && !(o.body instanceof Blob)){
    o.headers["Content-Type"]="application/json"; o.body=JSON.stringify(o.body);
  }
  const r=await fetch(API+path,o);
  if(r.status===401){ logout(); throw new Error("Sesión expirada"); }
  const ct=r.headers.get("Content-Type")||"";
  const data=ct.includes("json")?await r.json():await r.text();
  if(!r.ok) throw new Error((data&&data.error)||"Error");
  return data;
}

/* ============================== login ============================== */
async function doLogin(){
  const pw=$("#pw").value;
  $("#loginErr").textContent="";
  try{
    const {token}=await api("/api/login",{method:"POST",body:{password:pw}});
    TOKEN=token; localStorage.setItem("sub_token",token);
    $("#login").classList.add("hidden");
    $("#app").classList.remove("hidden"); $("#nav").classList.remove("hidden");
    await load(); go("queue");
  }catch(e){ $("#loginErr").textContent=e.message; }
}
function logout(){
  TOKEN=""; localStorage.removeItem("sub_token");
  $("#app").classList.add("hidden"); $("#nav").classList.add("hidden");
  $("#login").classList.remove("hidden");
}
$("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});

/* ============================== carga / formato ============================== */
async function load(){ STATE=await api("/api/state"); }
function S(){ return STATE.settings; }
function dispCur(){ return S().display_currency||"GTQ"; }
function symbol(c){ return c==="USD"?"$":"Q"; }
function money(v,c){ return symbol(c)+Number(v||0).toLocaleString("es-GT",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){
  if(!iso) return "—";
  const d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("es-GT",{day:"numeric",month:"short"});
}
function dueLabel(days){
  if(days===null||days===undefined) return {txt:"Sin fecha",cls:"blue"};
  if(days<0) return {txt:`Vencido ${-days}d`,cls:"red"};
  if(days===0) return {txt:"Vence hoy",cls:"red"};
  if(days===1) return {txt:"Mañana",cls:"amber"};
  if(days<=5) return {txt:`En ${days} días`,cls:"amber"};
  return {txt:`En ${days} días`,cls:"green"};
}
function avatarHtml(s){
  const transp = s.color==="transparent";
  const white = s.color==="#ffffff";
  const border = (transp||white) ? "border:1px solid var(--line)" : "";
  if(s.icon_type==="logo"&&s.icon_value)
    return `<div class="avatar" style="background:${transp?'transparent':s.color};${border}"><img src="/logo/${s.icon_value}" alt=""></div>`;
  if(s.icon_type==="letter")
    return `<div class="avatar" style="background:${transp?'var(--card2)':s.color};${border};color:${white?'#1a1a1a':'#fff'}">${(s.name||"?").charAt(0).toUpperCase()}</div>`;
  const tint = transp ? "var(--card2)" : (white ? "#ffffff22" : s.color+"22");
  const fg = transp ? "var(--txt)" : (white ? "#e8e8e8" : s.color);
  return `<div class="avatar" style="background:${tint};${border};color:${fg}">${s.icon_value||"💳"}</div>`;
}
function cycleText(s){
  if(s.billing_type==="manual") return "Pago manual";
  const u={week:"sem",month:"mes",year:"año"}[s.interval_unit]||"mes";
  return s.interval_count>1?`Cada ${s.interval_count} ${u==='mes'?'meses':u+'s'}`:`Cada ${u}`;
}

/* ============================== navegación ============================== */
function go(tab){
  TAB=tab; EDIT_ID=null;
  document.querySelectorAll(".nav button[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  const titles={queue:["Próximos pagos","Ordenados por fecha de cobro"],summary:["Resumen","Tu gasto en suscripciones"],
    add:["Nueva suscripción","Agrega un servicio o pago"],all:["Todas","Tus suscripciones activas"],settings:["Ajustes","Preferencias y avisos"]};
  $("#pageTitle").textContent=titles[tab][0]; $("#pageSub").textContent=titles[tab][1];
  window.scrollTo(0,0);
  const c=$("#content"); c.innerHTML="";
  const view={queue:viewQueue,summary:viewSummary,add:viewForm,all:viewAll,settings:viewSettings}[tab];
  c.appendChild(view());
}
async function reload(){ await load(); go(TAB); }

/* ============================== vista: cola ============================== */
function viewQueue(){
  const p=h(`<div class="page"></div>`);
  const subs=STATE.subscriptions.filter(s=>s.active);
  const sum=STATE.summary;

  // hero
  if(sum.next_payment){
    const np=sum.next_payment; const dl=dueLabel(np.days);
    p.appendChild(h(`<div class="hero">
      <div class="lbl">Próximo pago</div>
      <div class="name">${esc(np.name)}</div>
      <div class="row"><div class="amt">${money(np.amount,np.currency)}</div>
        <div class="when">${dl.txt} · ${fmtDate(np.date)}</div></div>
    </div>`));
  }else{
    p.appendChild(h(`<div class="hero empty"><div class="lbl">Todo al día</div>
      <div class="name">Sin pagos pendientes 🎉</div></div>`));
  }

  // stat chips
  p.appendChild(h(`<div class="stats">
    <div class="stat"><div class="k">Mensual</div><div class="v">${money(sum.monthly_recurring,sum.display_currency)}</div></div>
    <div class="stat"><div class="k">Anual estim.</div><div class="v">${money(sum.yearly_estimate,sum.display_currency)}</div></div>
    <div class="stat"><div class="k">Activas</div><div class="v">${sum.active_count}</div></div>
  </div>`));

  // section header + order toggle
  const manual=subs.some(s=>s.manual_sort);
  p.appendChild(h(`<div class="sectionhdr"><div class="t">Cola de pagos</div>
    <button class="toggleorder" onclick="${manual?'autoOrder()':''}">${manual?'↺ Orden automático':'↕ Arrastra para reordenar'}</button></div>`));

  if(!subs.length){
    p.appendChild(h(`<div class="empty-state"><div class="e">🗒️</div><p>Aún no tienes suscripciones.<br>Toca el botón ＋ para agregar una.</p></div>`));
    return p;
  }
  const list=h(`<div class="list" id="queueList"></div>`);
  subs.forEach(s=>list.appendChild(subCard(s)));
  p.appendChild(list);
  enableDrag(list);
  return p;
}

function subCard(s){
  const dl=dueLabel(s.days_until);
  const card=h(`<div class="subcard" data-id="${s.id}">
    ${avatarHtml(s)}
    <div class="subinfo">
      <div class="nm">${esc(s.name)}</div>
      <div class="meta"><span class="pill ${dl.cls}">${dl.txt}</span><span>${fmtDate(s.next_due_date)}</span><span>· ${cycleText(s)}</span></div>
    </div>
    <div class="subright">
      <div class="amt">${money(s.amount,s.currency)}</div>
      <button class="paybtn">✓ Pagué</button>
    </div>
  </div>`);
  // expand on tap (info area)
  $(".subinfo",card).addEventListener("click",()=>{ card.classList.toggle("open"); if(card.classList.contains("open")&&!$(".details",card)) renderDetails(card,s); });
  $(".avatar",card).addEventListener("click",()=>{ card.classList.toggle("open"); if(card.classList.contains("open")&&!$(".details",card)) renderDetails(card,s); });
  $(".paybtn",card).addEventListener("click",(e)=>{e.stopPropagation();markPaid(s.id);});
  return card;
}

function renderDetails(card,s){
  const d=h(`<div class="details"></div>`);
  d.appendChild(h(`<div class="detrow"><span class="lab">Tomada el</span><span>${s.anchor_date?fmtDate(s.anchor_date):"—"}</span></div>`));
  d.appendChild(h(`<div class="detrow"><span class="lab">Ciclo</span><span>${cycleText(s)}</span></div>`));
  if(s.notes) d.appendChild(h(`<div class="detrow"><span class="lab">Nota</span><span>${esc(s.notes)}</span></div>`));

  if(s.billing_type==="manual"){
    const pend=s.payments.filter(p=>!p.paid).sort((a,b)=>a.due_date<b.due_date?-1:1);
    const done=s.payments.filter(p=>p.paid).sort((a,b)=>a.due_date<b.due_date?1:-1);
    const pl=h(`<div class="paylist"></div>`);
    pl.appendChild(h(`<div class="lab" style="font-size:12px;color:var(--muted)">Pagos programados</div>`));
    pend.forEach(p=>pl.appendChild(payItem(p)));
    if(done.length){
      pl.appendChild(h(`<div class="lab" style="font-size:12px;color:var(--muted);margin-top:6px">Pagados</div>`));
      done.slice(0,4).forEach(p=>pl.appendChild(payItem(p)));
    }
    d.appendChild(pl);
    const add=h(`<button class="addrow">＋ Agregar fecha de pago</button>`);
    add.addEventListener("click",()=>addManualPayment(s));
    d.appendChild(add);
  }

  const mb=h(`<div class="minibtns">
    <button class="btn ghost" style="flex:1">✏️ Editar</button>
    <button class="btn danger" style="flex:1">🗑️ Borrar</button></div>`);
  mb.children[0].addEventListener("click",()=>editSub(s.id));
  mb.children[1].addEventListener("click",()=>delSub(s.id,s.name));
  d.appendChild(mb);
  card.appendChild(d);
}
function payItem(p){
  const it=h(`<div class="payitem ${p.paid?'done':''}">
    <div class="pd"><div class="chk ${p.paid?'on':''}">${p.paid?'✓':''}</div><span>${fmtDate(p.due_date)} · ${money(p.amount,p.currency)}</span></div>
    <button class="addrow" style="color:var(--muted2)">⋯</button></div>`);
  $(".chk",it).addEventListener("click",async()=>{await api(`/api/payments/${p.id}/pay`,{method:"POST",body:{paid:!p.paid}});toast(p.paid?"Desmarcado":"¡Pago marcado!");reload();});
  $("button",it).addEventListener("click",async()=>{if(confirm("¿Eliminar este pago?")){await api(`/api/payments/${p.id}`,{method:"DELETE"});reload();}});
  return it;
}

async function markPaid(id){
  try{ await api(`/api/subscriptions/${id}/pay`,{method:"POST"}); toast("¡Pago registrado! Movido en la cola"); await reload(); }
  catch(e){ toast(e.message); }
}
async function addManualPayment(s){
  const date=prompt("Fecha del pago (AAAA-MM-DD):", STATE.today);
  if(!date) return;
  const amt=prompt("Monto:", s.amount);
  await api(`/api/subscriptions/${s.id}/payments`,{method:"POST",body:{due_date:date,amount:parseFloat(amt)||0,currency:s.currency}});
  toast("Pago agregado"); reload();
}
async function delSub(id,name){
  if(!confirm(`¿Borrar "${name}" y todo su historial?`)) return;
  await api(`/api/subscriptions/${id}`,{method:"DELETE"}); toast("Eliminada"); reload();
}
async function autoOrder(){ await api("/api/reorder/auto",{method:"POST"}); toast("Orden automático por fecha"); reload(); }

/* ============================== vista: todas ============================== */
function viewAll(){
  const p=h(`<div class="page"></div>`);
  const subs=STATE.subscriptions;
  if(!subs.length){ p.appendChild(h(`<div class="empty-state"><div class="e">🗂️</div><p>Sin suscripciones todavía.</p></div>`)); return p; }
  const list=h(`<div class="list"></div>`);
  subs.forEach(s=>{
    const c=subCard(s);
    if(!s.active){ c.style.opacity=".5"; }
    list.appendChild(c);
  });
  p.appendChild(list);
  return p;
}

/* ============================== vista: resumen ============================== */
function viewSummary(){
  const p=h(`<div class="page"></div>`);
  const sum=STATE.summary; const dc=sum.display_currency;
  p.appendChild(h(`<div class="bigstat"><div class="k">Gasto mensual recurrente</div>
    <div class="v">${money(sum.monthly_recurring,dc)} <small>/mes</small></div></div>`));
  p.appendChild(h(`<div class="two">
    <div class="bigstat" style="margin:0"><div class="k">Estimado anual</div><div class="v" style="font-size:24px">${money(sum.yearly_estimate,dc)}</div></div>
    <div class="bigstat" style="margin:0"><div class="k">Pagado este mes</div><div class="v" style="font-size:24px">${money(sum.paid_this_month,dc)}</div></div>
  </div>`));
  p.appendChild(h(`<div style="height:13px"></div>`));

  // desglose por suscripción (recurrentes, equivalente mensual)
  const rate=parseFloat(S().exchange_rate||"7.8");
  const conv=(a,c)=>c===dc?a:(c==="USD"?a*rate:a/rate);
  const mfac=(s)=>{const k=s.interval_count||1;return s.interval_unit==="week"?(52/12)/k:s.interval_unit==="year"?1/(12*k):1/k;};
  const rows=STATE.subscriptions.filter(s=>s.active&&s.billing_type==="recurring")
    .map(s=>({name:s.name,color:s.color,m:conv(s.amount,s.currency)*mfac(s)})).sort((a,b)=>b.m-a.m);
  const max=Math.max(...rows.map(r=>r.m),1);
  if(rows.length){
    p.appendChild(h(`<div class="sectionhdr"><div class="t">Desglose mensual por servicio</div></div>`));
    const bars=h(`<div class="card"><div class="bars"></div></div>`);
    const bc=$(".bars",bars);
    rows.forEach(r=>{
      bc.appendChild(h(`<div class="barrow"><div class="top"><span>${esc(r.name)}</span><span>${money(r.m,dc)}</span></div>
        <div class="track"><div class="fill" style="width:${Math.max(6,r.m/max*100)}%;background:linear-gradient(90deg,${r.color},${r.color}aa)"></div></div></div>`));
    });
    p.appendChild(bars);
  }else{
    p.appendChild(h(`<div class="empty-state"><div class="e">📊</div><p>Agrega suscripciones recurrentes<br>para ver tu desglose.</p></div>`));
  }
  return p;
}

let FORM = null;
function blankForm(){
  return {name:"",icon_type:"emoji",icon_value:"💳",color:"#6366f1",amount:"",currency:dispCur(),
    billing_type:"recurring",interval_unit:"month",interval_count:1,anchor_date:STATE.today,
    next_due_date:STATE.today,reminder_days:"",notes:"",payments:[]};
}
function editSub(id){
  const s=STATE.subscriptions.find(x=>x.id===id);
  EDIT_ID=id;
  FORM={...s, amount:s.amount, reminder_days:s.reminder_days??"", payments:(s.payments||[]).filter(p=>!p.paid).map(p=>({due_date:p.due_date,amount:p.amount,id:p.id}))};
  TAB="add"; document.querySelectorAll(".nav button[data-tab]").forEach(b=>b.classList.remove("on"));
  $("#pageTitle").textContent="Editar suscripción"; $("#pageSub").textContent=s.name;
  window.scrollTo(0,0); const c=$("#content"); c.innerHTML=""; c.appendChild(viewForm());
}

function viewForm(){
  if(!FORM||EDIT_ID===null) FORM=EDIT_ID?FORM:blankForm();
  if(!FORM) FORM=blankForm();
  const f=FORM;
  const p=h(`<div class="page"></div>`);

  // preview
  const prev=h(`<div class="preview"></div>`);
  function refreshPreview(){
    prev.innerHTML="";
    prev.appendChild(h(avatarHtml({icon_type:f.icon_type,icon_value:f.icon_value,color:f.color,name:f.name||"?"})));
    prev.appendChild(h(`<div><div style="font-weight:700">${esc(f.name||"Nombre del servicio")}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-top:3px">${f.amount?money(f.amount,f.currency):"Q0.00"} · ${f.billing_type==="manual"?"Pago manual":cycleText(f)}</div></div>`));
  }
  refreshPreview();
  p.appendChild(prev);

  const card=h(`<div class="card"></div>`);

  // nombre
  card.appendChild(field("Nombre","",()=>{
    const i=h(`<input class="input" placeholder="Netflix, Seguro de carro..." value="${esc(f.name)}">`);
    i.addEventListener("input",()=>{f.name=i.value;refreshPreview();}); return i;
  }));

  // icono: tipo
  const iconSeg=h(`<div class="seg" style="margin-bottom:11px">
    <button data-v="emoji">Emoji</button><button data-v="letter">Inicial</button><button data-v="logo">Logo</button></div>`);
  const iconArea=h(`<div></div>`);
  function renderIconArea(){
    iconArea.innerHTML="";
    iconSeg.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===f.icon_type));
    if(f.icon_type==="emoji"){
      const g=h(`<div class="emojigrid"></div>`);
      EMOJIS.forEach(e=>{const b=h(`<button class="${f.icon_value===e?'on':''}">${e}</button>`);
        b.addEventListener("click",()=>{f.icon_value=e;renderIconArea();refreshPreview();});g.appendChild(b);});
      iconArea.appendChild(g);
    }else if(f.icon_type==="letter"){
      iconArea.appendChild(h(`<div style="font-size:12.5px;color:var(--muted)">Se usará la primera letra del nombre.</div>`));
    }else{
      const box=h(`<div></div>`);
      const renderLogo=()=>{
        box.innerHTML="";
        if(f.icon_value && f.icon_type==="logo"){
          const bg = f.color==="transparent" ? "repeating-conic-gradient(#9aa3c7 0% 25%, #2a3460 0% 50%) 50% / 12px 12px" : f.color;
          const card=h(`<div class="uploaded">
            <div class="thumb" style="background:${bg}"><img src="/logo/${f.icon_value}" alt=""></div>
            <div style="flex:1;min-width:0">
              <div class="ok">✓ Logo cargado</div>
              <div class="subt">Guardado en tu R2 · listo para usar</div>
            </div>
            <button class="linklike" type="button">Cambiar</button>
          </div>`);
          $("button",card).addEventListener("click",()=>{ f.icon_value=""; renderLogo(); refreshPreview(); });
          box.appendChild(card);
        }else{
          const drop=h(`<div class="uploadbox">
            <label class="uploadbtn">📤 Subir logo<input type="file" accept="image/*" hidden></label>
            <div style="margin-top:11px;font-size:12px;color:var(--muted)">PNG, JPG o SVG · se guarda en tu R2</div>
          </div>`);
          $("input",drop).addEventListener("change",async(e)=>{
            const file=e.target.files[0]; if(!file) return;
            box.innerHTML=`<div class="uploadbox"><div class="uploading"><span class="spinner"></span> Subiendo logo...</div></div>`;
            try{
              const buf=await file.arrayBuffer();
              const r=await api("/api/logo",{method:"POST",body:buf,headers:{"Content-Type":file.type}});
              f.icon_value=r.key; renderLogo(); refreshPreview(); toast("¡Logo cargado! ✓");
            }catch(err){ toast("Error al subir el logo"); renderLogo(); }
          });
          box.appendChild(drop);
        }
      };
      renderLogo();
      iconArea.appendChild(box);
    }
  }
  iconSeg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{f.icon_type=b.dataset.v;if(b.dataset.v==="emoji"&&!EMOJIS.includes(f.icon_value))f.icon_value="💳";renderIconArea();refreshPreview();}));
  card.appendChild(label("Icono"));
  card.appendChild(iconSeg); card.appendChild(iconArea); renderIconArea();

  // color
  card.appendChild(label("Color"));
  const cr=h(`<div class="colorrow" style="margin-bottom:14px"></div>`);
  COLORS.forEach(c=>{
    let style, title="";
    if(c==="transparent"){ style="background:repeating-conic-gradient(#9aa3c7 0% 25%, #2a3460 0% 50%) 50% / 12px 12px;border:1px solid var(--line)"; title="Sin fondo"; }
    else if(c==="#ffffff"){ style="background:#ffffff;border:2px solid #c7cbe0"; title="Blanco"; }
    else style=`background:${c}`;
    const sw=h(`<button class="swatch ${f.color===c?'on':''}" style="${style}" title="${title}"></button>`);
    sw.addEventListener("click",()=>{f.color=c;cr.querySelectorAll(".swatch").forEach(x=>x.classList.remove("on"));sw.classList.add("on");refreshPreview();});
    cr.appendChild(sw);
  });
  card.appendChild(h(`<div style="font-size:11.5px;color:var(--muted2);margin:-4px 0 10px">Tip: usa blanco para logos como Microsoft, o "sin fondo" (cuadros) para logos transparentes.</div>`));
  card.appendChild(cr);

  // monto + moneda
  const moneyRow=h(`<div class="two"></div>`);
  moneyRow.appendChild(field("Monto","",()=>{
    const i=h(`<input class="input" type="number" inputmode="decimal" step="0.01" placeholder="0.00" value="${f.amount}">`);
    i.addEventListener("input",()=>{f.amount=i.value;refreshPreview();});return i;}));
  moneyRow.appendChild(field("Moneda","",()=>{
    const s=h(`<select class="input"><option value="GTQ"${f.currency==="GTQ"?" selected":""}>Q Quetzales</option><option value="USD"${f.currency==="USD"?" selected":""}>$ Dólares</option></select>`);
    s.addEventListener("change",()=>{f.currency=s.value;refreshPreview();});return s;}));
  card.appendChild(moneyRow);

  // tipo de cobro
  card.appendChild(label("Tipo de cobro"));
  const typeSeg=h(`<div class="seg" style="margin-bottom:14px">
    <button data-v="recurring">🔁 Recurrente</button><button data-v="manual">📅 Manual</button></div>`);
  const dyn=h(`<div></div>`);
  function renderDyn(){
    typeSeg.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===f.billing_type));
    dyn.innerHTML="";
    if(f.billing_type==="recurring"){
      const r1=h(`<div class="two"></div>`);
      r1.appendChild(field("Cada","",()=>{const i=h(`<input class="input" type="number" min="1" value="${f.interval_count}">`);i.addEventListener("input",()=>f.interval_count=parseInt(i.value)||1);return i;}));
      r1.appendChild(field("Periodo","",()=>{const s=h(`<select class="input"><option value="week"${f.interval_unit==="week"?" selected":""}>Semana(s)</option><option value="month"${f.interval_unit==="month"?" selected":""}>Mes(es)</option><option value="year"${f.interval_unit==="year"?" selected":""}>Año(s)</option></select>`);s.addEventListener("change",()=>{f.interval_unit=s.value;refreshPreview();});return s;}));
      dyn.appendChild(r1);
      const r2=h(`<div class="two"></div>`);
      r2.appendChild(field("Próximo pago","",()=>{const i=h(`<input class="input" type="date" value="${f.next_due_date||STATE.today}">`);i.addEventListener("change",()=>f.next_due_date=i.value);return i;}));
      r2.appendChild(field("Fecha que la tomaste","",()=>{const i=h(`<input class="input" type="date" value="${f.anchor_date||STATE.today}">`);i.addEventListener("change",()=>f.anchor_date=i.value);return i;}));
      dyn.appendChild(r2);
    }else{
      dyn.appendChild(h(`<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Agrega las fechas exactas en que pagas (ej. tu seguro de carro). La app las ordena y te avisa de la más próxima.</div>`));
      const wrap=h(`<div id="mpwrap"></div>`);
      function renderMP(){
        wrap.innerHTML="";
        f.payments.forEach((p,idx)=>{
          const row=h(`<div class="manualpay"><input class="input" type="date" value="${p.due_date||STATE.today}"><input class="input" type="number" step="0.01" placeholder="Monto" value="${p.amount??''}" style="max-width:110px"><button class="iconbtn" style="width:38px;height:38px">✕</button></div>`);
          const [d,a,del]=row.children;
          d.addEventListener("change",()=>p.due_date=d.value);
          a.addEventListener("input",()=>p.amount=parseFloat(a.value)||0);
          del.addEventListener("click",()=>{f.payments.splice(idx,1);renderMP();});
          wrap.appendChild(row);
        });
        const add=h(`<button class="addrow">＋ Agregar fecha</button>`);
        add.addEventListener("click",()=>{f.payments.push({due_date:STATE.today,amount:f.amount||0});renderMP();});
        wrap.appendChild(add);
      }
      renderMP();
      dyn.appendChild(wrap);
    }
  }
  typeSeg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{f.billing_type=b.dataset.v;renderDyn();refreshPreview();}));
  card.appendChild(typeSeg); card.appendChild(dyn); renderDyn();

  // aviso override + notas
  card.appendChild(field("Avisarme (días antes) — opcional","",()=>{
    const i=h(`<input class="input" type="number" min="0" placeholder="Usar global (${S().reminder_days})" value="${f.reminder_days}">`);
    i.addEventListener("input",()=>f.reminder_days=i.value);return i;}));
  card.appendChild(field("Notas — opcional","",()=>{
    const t=h(`<textarea class="input" placeholder="Detalles, número de póliza, etc.">${esc(f.notes||"")}</textarea>`);
    t.addEventListener("input",()=>f.notes=t.value);return t;}));

  p.appendChild(card);

  const save=h(`<button class="btn" style="width:100%;margin-bottom:10px">${EDIT_ID?"Guardar cambios":"Agregar suscripción"}</button>`);
  save.addEventListener("click",submitForm);
  p.appendChild(save);
  if(EDIT_ID){const cancel=h(`<button class="btn ghost" style="width:100%">Cancelar</button>`);cancel.addEventListener("click",()=>{EDIT_ID=null;FORM=null;go("queue");});p.appendChild(cancel);}
  return p;
}

async function submitForm(){
  const f=FORM;
  if(!f.name.trim()){toast("Ponle un nombre");return;}
  const body={...f, amount:parseFloat(f.amount)||0, interval_count:parseInt(f.interval_count)||1,
    reminder_days:f.reminder_days===""?null:parseInt(f.reminder_days)};
  try{
    if(EDIT_ID){
      await api(`/api/subscriptions/${EDIT_ID}`,{method:"PUT",body});
      // sincronizar pagos manuales nuevos
      if(f.billing_type==="manual"){
        for(const p of f.payments){ if(!p.id) await api(`/api/subscriptions/${EDIT_ID}/payments`,{method:"POST",body:{due_date:p.due_date,amount:p.amount,currency:f.currency}}); }
      }
      toast("Cambios guardados");
    }else{
      await api("/api/subscriptions",{method:"POST",body});
      toast("¡Suscripción agregada!");
    }
    EDIT_ID=null; FORM=null; await reload(); go("queue");
  }catch(e){toast(e.message);}
}

  const chSeg=h(`<div class="seg" style="margin-bottom:14px"><button data-v="app">📱 App</button><button data-v="whatsapp">🟢 WhatsApp</button><button data-v="sms">✉️ SMS</button></div>`);
  chSeg.querySelectorAll("button").forEach(b=>{b.classList.toggle("on",b.dataset.v===(s.notify_channel||"app"));
    b.addEventListener("click",()=>{chSeg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");s.notify_channel=b.dataset.v;});});
  card2.appendChild(chSeg);
  card2.appendChild(field("Mi número (con código país, ej. +1...)","",()=>{const i=h(`<input class="input" type="tel" placeholder="+1 510 555 1234" value="${s.notify_phone||''}">`);i.addEventListener("input",()=>s.notify_phone=i.value);return i;}));
  p.appendChild(card2);

  const save=h(`<button class="btn" style="width:100%;margin-bottom:10px">Guardar ajustes</button>`);
  save.addEventListener("click",async()=>{
    await api("/api/settings",{method:"PUT",body:{display_currency:s.display_currency,exchange_rate:s.exchange_rate,reminder_days:s.reminder_days,notify_channel:s.notify_channel,notify_phone:s.notify_phone}});
    toast("Ajustes guardados"); await reload(); go("settings");
  });
  p.appendChild(save);
  p.appendChild(h(`<button class="btn ghost" style="width:100%" onclick="logout()">Cerrar sesión</button>`));
  p.appendChild(h(`<div style="text-align:center;color:var(--muted2);font-size:12px;margin-top:18px">Datos en Cloudflare D1 · Logos en R2</div>`));
  return p;
}

/* ============================== helpers UI ============================== */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function label(t){return h(`<div style="font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:7px">${t}</div>`)}
function field(lbl,_,make){const f=h(`<div class="field"></div>`);f.appendChild(label(lbl));f.appendChild(make());return f;}

/* ============================== drag reorder ============================== */
function enableDrag(list){
  let drag=null,placeholderIdx=null,startY=0;
  list.querySelectorAll(".subcard").forEach(card=>{
    const av=$(".avatar",card);
    let hold=null;
    const start=(e)=>{
      hold=setTimeout(()=>{
        drag=card; card.classList.add("dragging");
        startY=(e.touches?e.touches[0].clientY:e.clientY);
        document.body.style.userSelect="none";
        navigator.vibrate&&navigator.vibrate(15);
      },220);
    };
    const cancel=()=>{clearTimeout(hold);};
    card.addEventListener("touchstart",start,{passive:true});
    card.addEventListener("touchend",cancel);
    card.addEventListener("touchmove",cancel);
    card.addEventListener("mousedown",start);
    card.addEventListener("mouseup",cancel);
    card.addEventListener("mouseleave",cancel);
  });
  function move(e){
    if(!drag) return;
    const y=(e.touches?e.touches[0].clientY:e.clientY);
    const cards=[...list.querySelectorAll(".subcard:not(.dragging)")];
    const after=cards.find(c=>{const r=c.getBoundingClientRect();return y<r.top+r.height/2;});
    if(after) list.insertBefore(drag,after); else list.appendChild(drag);
    e.preventDefault&&e.preventDefault();
  }
  function end(){
    if(!drag) return;
    drag.classList.remove("dragging"); drag=null; document.body.style.userSelect="";
    const order=[...list.querySelectorAll(".subcard")].map(c=>Number(c.dataset.id));
    api("/api/reorder",{method:"POST",body:{order}}).then(()=>{toast("Orden guardado");load();});
  }
  document.addEventListener("touchmove",move,{passive:false});
  document.addEventListener("mousemove",move);
  document.addEventListener("touchend",end);
  document.addEventListener("mouseup",end);
}

/* ============================== init ============================== */
(async function(){
  if(TOKEN){
    try{ await load(); $("#login").classList.add("hidden"); $("#app").classList.remove("hidden"); $("#nav").classList.remove("hidden"); go("queue"); }
    catch(e){ logout(); }
  }
})();
